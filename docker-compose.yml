version: '3.8'

services:
  db:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: fx-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "6543:5432"
    networks:
      - fx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fx_user -d fx_forecast"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: fx-backend-app
    volumes:
      - .:/app
    ports:
      - "8900:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fx-network
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
      "

  tradermade-stream:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: tradermade-stream
    volumes:
      - .:/app
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - TRADERMADE_API_KEY=${TRADERMADE_API_KEY}
      - TRADERMADE_WEBSOCKET_URL=${TRADERMADE_WEBSOCKET_URL:-wss://marketdata.tradermade.com/feedadv}
      - TARGET_SYMBOL=${TARGET_SYMBOL:-XAUUSD}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-/app/logs}
    networks:
      - fx-network
    restart: unless-stopped
    command: python -m src.stream.stream_client

volumes:
  postgres_data:

networks:
  fx-network:
    driver: bridge