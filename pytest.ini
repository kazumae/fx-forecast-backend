[pytest]
# pytest設定ファイル

# テストディレクトリ
testpaths = tests

# Pythonファイルのパターン
python_files = test_*.py

# テストクラスのパターン
python_classes = Test*

# テスト関数のパターン
python_functions = test_*

# 出力オプション
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --maxfail=1
    --disable-warnings
    -p no:warnings

# マーカー定義
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    smoke: Smoke tests
    pattern: Pattern detection tests
    evaluation: Entry evaluation tests
    signal: Signal generation tests
    validation: Signal validation tests

# カバレッジ設定
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*
    */__init__.py
    */config.py
    */migrations/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml